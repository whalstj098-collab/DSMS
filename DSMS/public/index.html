      <h2>지식의 연결,<br />성장의 시작점</h2>

        선생님, 선배님, 학생을 연결하여 궁금한 것들을 자유롭게 질문하고 멘토링

      <div class="buttons">

    <section class="feature">

        <h3>교과 선생님 찾기</h3>
        <p>
          원하는 과목의 선생님을 <br />

        </p>

      <div class="card">
        <h3>질문 게시판</h3>
        <p>
          선생님, 선배님에게 궁금한 것을 자유롭게 물어봐 자신의 역량을 키워

    <script>
      function logout() {
        localStorage.removeItem("token"); // 로컬 스토리지에서 토큰을 제거하여 로그아웃 처리
        alert("로그아웃 되었습니다.");
        location.href = "login.html"; // 로그아웃 후 로그인 페이지로 이동
      }
    </script>
    <script>
      function logout() {
        localStorage.removeItem("token"); // 로컬 스토리지에서 "token"이라는 키로 저장된 값을 제거하여 로그아웃 처리
        alert("로그아웃 되었습니다.");
        location.href = "login.html"; // 로그아웃 후 로그인 페이지로 이동하여 사용자가 다시 로그인할 수 있도록 함
      }

      const token = localStorage.getItem("token");

      const loginMenu = document.getElementById("login-menu"); // "login-menu"라는 ID를 가진 요소를 가져와서 loginMenu 변수에 할당
      const logoutMenu = document.getElementById("logout-menu");

      if (token) {
        loginMenu.style.display = "none"; // 로그인 메뉴 숨김
        logoutMenu.style.display = "inline";
      } else {
        logoutMenu.style.display = "none"; // 로그아웃 메뉴 숨김
      }
    </script>
    <script src="menu.js"></script>
  </body>
