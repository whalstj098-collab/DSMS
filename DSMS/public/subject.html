<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>subject</title>
  </head>
  <link rel="stylesheet" href="style.css" />
  <body>
    <header>
      <div>
        <img class="logo" src="DSMS_logo.jpg" alt="DSMS 로고" />
      </div>
      <div class="div a">
        <a href="index.html">홈</a>
        <a href="login.html">로그인</a>
        <a href="major.html">전공</a>
        <a href="subject.html">교과</a>
        <a href="message.html">질문 게시판</a>
        <a href="focus.html">방해금지</a>
        <a id="logout-menu" href="#" onclick="logout()">로그아웃</a>
      </div>
    </header>
    <div class="subject-form">
      <select id="subject-select">
        <option value="전체">전체</option>
        <option value="국어">국어</option>
        <option value="수학">수학</option>
        <option value="영어">영어</option>
        <option value="과학">과학</option>
        <option value="사회">사회</option>
        <option value="화면디자인">화면디자인</option>
        <option value="프로그래밍">프로그래밍</option>
      </select>

      <!--질문 텍스트 박스-->
      <textarea
        id="subject-message"
        placeholder="교과 질문을 입력하세요"
      ></textarea>

      <button id="subject-send-btn">질문 등록</button>
    </div>

    <div id="subject-list"></div>

    <script src="subject.js"></script>
    <!-- subject.js 파일을 연결하여 교과 질문 등록 및 조회 기능을 사용 -->
    <script src="menu.js"></script>
    <!-- menu.js 파일을 연결하여 로그인 상태에 따른 메뉴 기능을 사용 -->
  </body>
</html>
