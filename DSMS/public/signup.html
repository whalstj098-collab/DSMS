<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>signup</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="div a">
        <img class="logo" src="DSMS_logo.jpg" alt="DSMS 로고" />
      </div>
    </header>
    <section class="login-section">
      <!-- 로그인 섹션과 동일한 스타일을 사용하여 회원가입 섹션을 만듭니다. -->
      <div class="login-card">
        <h2>회원가입</h2>

        <input type="text" id="name" placeholder="이름을 입력하세요" />

        <input type="email" id="email" placeholder="이메일을 입력하세요" />

        <input
          type="password"
          id="password"
          placeholder="비밀번호를 입력하세요"
        />
        <!--이름, 이메일, 비밀번호 입력-->

        <!--학년, 자기소개 입력-->
        <select id="major">
          <option value="AI">AI</option>
          <option value="백엔드">백엔드</option>
          <option value="프론트엔드">프론트엔드</option>
          <option value="게임">게임</option>
          <option value="임베디드">임베디드</option>
          <option value="DevOps">DevOps</option>
          <option value="플러터">플러터</option>
          <option value="정보보안">정보보안</option>
          <option value="디자인">디자인</option>
          <option value="안드로이드">안드로이드</option>
          <option value="iOS">iOS</option>
        </select>

        <input
          type="text"
          id="grade"
          placeholder="학년을 입력하세요 (예: 2학년)"
        />

        <textarea id="intro" placeholder="자기소개를 입력하세요"></textarea>

        <button id="signup-btn">회원가입</button>
      </div>
    </section>

    <script src="signup.js"></script>
    <script src="menu.js"></script>
  </body>
</html>
